<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bus Booking Bot</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 h-screen flex items-center justify-center p-4">

<div class="w-full max-w-md bg-white rounded-lg shadow-lg flex flex-col h-[650px]">

    <!-- Header -->
    <div class="bg-blue-600 text-white p-4 rounded-t-lg font-bold text-lg">
        Bus AI Assistant
    </div>

    <!-- Chat Area -->
    <div id="chat-box" class="flex-1 p-4 overflow-y-auto flex flex-col gap-3">

        <div class="self-start bg-gray-200 p-3 rounded-lg max-w-[80%]">
            Hello! Ask me about buses, routes, or stops 🚍
        </div>

    </div>

    <!-- Input -->
    <div class="p-4 border-t flex gap-2">
        <input id="user-input" type="text"
               placeholder="Type your query..."
               class="flex-1 border rounded-lg px-3 py-2 focus:outline-none focus:border-blue-600">

        <button id="send-btn"
                class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">
            Send
        </button>
    </div>

</div>

<script>
const chatBox = document.getElementById('chat-box');
const userInput = document.getElementById('user-input');
const sendBtn = document.getElementById('send-btn');

function addMessage(content, isUser = false) {
    const div = document.createElement('div');
    div.className = isUser
        ? 'self-end bg-blue-600 text-white p-3 rounded-lg max-w-[80%]'
        : 'self-start bg-gray-200 text-gray-800 p-3 rounded-lg max-w-[80%]';

    div.innerHTML = content;
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
}

// -------- FORMAT BUS CARD --------
function renderBus(bus) {
    return `
        <div class="bg-white border rounded-lg p-3 shadow-sm mb-2">
            <div class="font-semibold text-blue-600">${bus.name}</div>
            <div class="text-sm">${bus.type}</div>
            <div class="text-sm">🕒 ${bus.departure}</div>
            <div class="text-sm">💰 ₹${bus.price}</div>
            ${bus.from && bus.to ? `<div class="text-xs text-gray-500">${bus.from} → ${bus.to}</div>` : ''}
        </div>
    `;
}

// -------- FORMAT STOPS --------
function renderStops(stops) {
    let html = `<div class="font-semibold mb-1">Stops:</div>`;
    stops.forEach(stop => {
        html += `<div class="text-sm">📍 ${stop.name}</div>`;
    });
    return html;
}

// -------- SEND MESSAGE --------
async function sendMessage() {
    const text = userInput.value.trim();
    if (!text) return;

    addMessage(text, true);
    userInput.value = '';

    const typing = document.createElement('div');
    typing.id = 'typing';
    typing.className = 'self-start bg-gray-200 p-2 rounded-lg text-sm italic';
    typing.textContent = 'Typing...';
    chatBox.appendChild(typing);

    try {
        const res = await fetch('/chat', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ query: text })
        });

        const data = await res.json();
        document.getElementById('typing').remove();

        // -------- MESSAGE --------
        if (data.message) {
            addMessage(data.message);
        }

        // -------- INFO HANDLING --------
        if (data.info && data.info.length > 0) {

            let content = "";

            // BUS RESULTS
            if (data.q_type === "busses" || data.q_type === "bus_info" || data.q_type === "route") {
                data.info.forEach(bus => {
                    content += renderBus(bus);
                });
            }

            // STOPS
            else if (data.q_type === "stops") {
                content = renderStops(data.info);
            }

            addMessage(content);
        }

    } catch (err) {
        document.getElementById('typing').remove();
        addMessage("❌ Server error. Try again.");
    }
}

// -------- EVENTS --------
sendBtn.addEventListener('click', sendMessage);

userInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') sendMessage();
});
</script>

</body>
</html>
